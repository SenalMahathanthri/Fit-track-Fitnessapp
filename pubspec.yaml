name: app
description: "fit trap app"
publish_to: 'none'
version: 1.0.0+1
environment:
  sdk: ^3.7.0
dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  
  # State Management and Navigation
  get: ^4.6.6
  
  # Local Storage
  shared_preferences: ^2.2.2
  sqflite: ^2.3.0
  path: ^1.8.3
  
  # Firebase (uncomment if using)
  # firebase_core: ^2.21.0
  # firebase_auth: ^4.12.1
  # cloud_firestore: ^4.12.2
  
  # UI Components
  fl_chart: ^0.65.0
  google_fonts: ^6.1.0
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  flutter_svg: ^2.0.9
  image_picker: ^1.0.4
  path_provider: ^2.1.1
  
  # Others
  intl: ^0.18.1
  http: ^1.1.0
  url_launcher: ^6.2.1
  fancy_bottom_navigation: ^0.3.3
  animated_toggle_switch: ^0.8.4
  firebase_auth: ^5.5.2
  fluttertoast: ^8.2.12
  firebase_core: ^3.13.0
  cloud_firestore: ^5.6.7
  permission_handler: ^12.0.0+1
  lottie: ^3.3.1
  markdown_widget: ^2.2.0
  font_awesome_flutter: ^10.7.0
  timezone: ^0.9.2
  firebase_messaging: ^15.2.5
  image: ^4.5.4
  share_plus: ^11.0.0
  flutter_local_notifications: ^18.0.1
  audioplayers: ^6.4.0
  flutter_launcher_icons: ^0.13.1  # Added for app icon generation
 
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

# App icon configuration
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "/assets/images/appicon.jpeg"
  min_sdk_android: 21
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "/assets/images/appicon.jpeg"

# The flutter section must be at this level, not nested under dependencies
flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/markdown/privacy_policy.md
